<div class="main-layout" [class.has-destino-preseleccionado]="destinoPreSeleccionado()">
  
  <!-- ============================================================ -->
  <!-- 🗺️ MAPA PÚBLICO                                             -->
  <!-- ============================================================ -->
  <main 
    class="map-container-layer"
    [class.has-navigation]="!destinoPreSeleccionado()"
    [class.full-height]="destinoPreSeleccionado()"
  >
    <app-public-map
      [polyline]="mapPolyline()"
      [stops]="mapStops()"
      [color]="mapColor()"
      [selectedLocation]="null"
      [origen]="mapOrigen()"
      [destino]="mapDestino()"
      [rutaPolyline]="mapRutaPolyline()"
      [rutaColor]="mapRutaColor()"
      (stopClicked)="handleStopClick($event)"
      (mapClicked)="handleMapClick($event.lat, $event.lng)"
      (locationCleared)="clearSelectedLocation()"
    ></app-public-map>
  </main>

  <!-- ============================================================ -->
  <!-- 🔍 BUSCADOR DE LUGARES (PleaceSearchComponent)                -->
  <!-- ============================================================ -->
  <app-pleace-search
    [destinoPreSeleccionado]="destinoPreSeleccionado()"
    (onDestinoSeleccionado)="onDestinoSeleccionado($event)"
    (onOrigenSeleccionado)="onOrigenSeleccionado($event)"
    (onBuscarRutas)="onBuscarRutas($event)"
    (onClearLocation)="onClearLocation()"
    (onToggleSearch)="onToggleSearch($event)"
  ></app-pleace-search>

  <!-- ============================================================ -->
  <!-- PANEL DE RESULTADOS                                          -->
  <!-- ============================================================ -->
  @if (showRouteResults()) {
    <div class="route-results-panel">
      <app-route-results
        [resultados]="resultadosBusqueda()"
        [isLoading]="false"
        [origenNombre]="origenNombre"
        [destinoNombre]="destinoNombre"
        (onSelectRoute)="handleSelectRoute($event)"
        (onClose)="cerrarResultadosConX()"
        (onBack)="cerrarResultadosConX()"
      ></app-route-results>
    </div>
  }

  <!-- ============================================================ -->
  <!-- PANEL DE PASOS                                              -->
  <!-- ============================================================ -->
  @if (showRouteSteps()) {
    <div class="route-steps-panel">
      <app-route-steps
        [ruta]="rutaSeleccionada"
        [origenNombre]="origenNombre"
        [destinoNombre]="destinoNombre"
        (onClose)="cerrarResultadosConX()"
        (onBack)="handleBackFromSteps()"
        (onShowInMap)="handleShowInMap()"
      ></app-route-steps>
    </div>
  }

  <!-- ============================================================ -->
  <!-- 📋 SIDEBAR - Detalles de la ruta seleccionada               -->
  <!-- ============================================================ -->
  @if (shouldShowRouteDetails) {
    <section class="sidebar-layer">
      <app-route-details
        [route]="routeService.selectedRoute()!"
        (mapDataChanged)="handleMapDataFromDetails($event)"
        (directionChanged)="onDirectionChanged($event)"
      ></app-route-details>
    </section>
  }

  <!-- ============================================================ -->
  <!-- 🧭 NAVEGACIÓN (componente separado)                          -->
  <!-- ============================================================ -->
  @if (!destinoPreSeleccionado()) {
    <app-navigation></app-navigation>
  }
</div>
